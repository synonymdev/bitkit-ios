			name = "Remove Static Framework Stubs";
			outputFileListPaths = (
			);
			outputPaths = (
				"${TARGET_BUILD_DIR}/${WRAPPER_NAME}/.static-ffi-stubs-removed",
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "# Remove static UniFFI framework stubs from the app bundle.\n# Code is linked into the main executable; empty frameworks break install and App Store validation.\nFRAMEWORKS_DIR=\"${TARGET_BUILD_DIR}/${WRAPPER_NAME}/Frameworks\"\nOUTPUT_SENTINEL=\"${TARGET_BUILD_DIR}/${WRAPPER_NAME}/.static-ffi-stubs-removed\"\n\nfor FRAMEWORK_NAME in LDKNodeFFI.framework vss_rust_client_ffiFFI.framework; do\n    FRAMEWORK_PATH=\"${FRAMEWORKS_DIR}/${FRAMEWORK_NAME}\"\n    if [ ! -d \"$FRAMEWORK_PATH\" ]; then\n        continue\n    fi\n    echo \"Removing ${FRAMEWORK_NAME} static framework stub...\"\n    rm -rf \"$FRAMEWORK_PATH\"\n    if [ -d \"$FRAMEWORK_PATH\" ]; then\n        echo \"error: Failed to remove ${FRAMEWORK_NAME} static framework stub\" >&2\n        exit 1\n    fi\n    echo \"Removed ${FRAMEWORK_NAME}.\"\ndone\n\ntouch \"$OUTPUT_SENTINEL\"\n";
		};
